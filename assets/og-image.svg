<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Main gradient accent -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
    <!-- Shield gradient matching existing brand -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e6b8"/>
      <stop offset="100%" stop-color="#00a88a"/>
    </linearGradient>
    <!-- Server inner gradient -->
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#12132a"/>
    </linearGradient>
    <!-- Subtle radial glow behind shield -->
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid dot pattern -->
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <!-- Clip for rounded rect -->
    <clipPath id="roundClip">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- ========== BACKGROUND ========== -->
  <rect width="1200" height="630" fill="#0d1117"/>
  <!-- Subtle dot grid overlay -->
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- ========== TOP GRADIENT LINE ========== -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- ========== BOTTOM GRADIENT LINE ========== -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad)" opacity="0.4"/>

  <!-- ========== LEFT SIDE: SHIELD ICON ========== -->
  <!-- Glow behind shield -->
  <ellipse cx="260" cy="315" rx="180" ry="180" fill="url(#shieldGlow)"/>

  <g transform="translate(110, 110) scale(0.62)">
    <!-- Shield outer -->
    <path d="M256 40 L440 120 L440 280 C440 380 360 450 256 480 C152 450 72 380 72 280 L72 120 Z"
          fill="url(#shieldGrad)" stroke="none"/>
    <!-- Shield inner dark -->
    <path d="M256 64 L418 134 L418 276 C418 368 346 430 256 458 C166 430 94 368 94 276 L94 134 Z"
          fill="url(#serverGrad)" stroke="none"/>

    <!-- Server rack top -->
    <rect x="166" y="156" width="180" height="64" rx="8" ry="8" fill="#2a2b4e" stroke="#00d4aa" stroke-width="2.5"/>
    <line x1="186" y1="176" x2="280" y2="176" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="186" y1="192" x2="310" y2="192" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <circle cx="326" cy="176" r="6" fill="#00d4aa"/>
    <circle cx="326" cy="196" r="5" fill="#00d4aa" opacity="0.5"/>

    <!-- Server rack middle -->
    <rect x="166" y="232" width="180" height="64" rx="8" ry="8" fill="#2a2b4e" stroke="#00d4aa" stroke-width="2.5"/>
    <line x1="186" y1="252" x2="270" y2="252" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="186" y1="268" x2="300" y2="268" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <circle cx="326" cy="252" r="6" fill="#00d4aa"/>
    <circle cx="326" cy="272" r="5" fill="#00d4aa" opacity="0.5"/>

    <!-- Server rack bottom -->
    <rect x="166" y="308" width="180" height="64" rx="8" ry="8" fill="#2a2b4e" stroke="#00d4aa" stroke-width="2.5"/>
    <line x1="186" y1="328" x2="290" y2="328" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="186" y1="344" x2="260" y2="344" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <circle cx="326" cy="328" r="6" fill="#00d4aa"/>
    <circle cx="326" cy="348" r="5" fill="#00d4aa" opacity="0.5"/>

    <!-- Checkmark -->
    <circle cx="256" cy="424" r="20" fill="#00d4aa"/>
    <polyline points="242,424 252,434 272,412" fill="none" stroke="#1a1b2e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ========== VERTICAL DIVIDER ========== -->
  <line x1="520" y1="80" x2="520" y2="550" stroke="url(#accentGrad)" stroke-width="1" opacity="0.2"/>

  <!-- ========== RIGHT SIDE: TEXT CONTENT ========== -->

  <!-- "VPS" in gradient accent -->
  <text x="580" y="235" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="url(#accentGrad)" letter-spacing="6">VPS</text>

  <!-- "SNAPSHOT" in white bold -->
  <text x="580" y="315" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#ffffff" letter-spacing="8">SNAPSHOT</text>

  <!-- Teal underline accent bar -->
  <rect x="580" y="335" width="120" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Tagline 1 -->
  <text x="580" y="400" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="400" fill="#b0bec5" letter-spacing="0.5">Full-disk VPS backup to the cloud</text>

  <!-- Tagline 2 -->
  <text x="580" y="440" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#78909c" letter-spacing="0.5">One command to install, one command to run</text>

  <!-- ========== BOTTOM: BADGES ========== -->

  <!-- "Built with Bun" badge -->
  <g transform="translate(950, 555)">
    <rect x="0" y="0" width="180" height="38" rx="19" fill="#1e1e2e" stroke="#00d4aa" stroke-width="1.5" opacity="0.9"/>
    <!-- Bun circle icon -->
    <circle cx="26" cy="19" r="10" fill="#fbf0df"/>
    <!-- Simplified bun shape -->
    <circle cx="26" cy="20" r="6" fill="#f9dc5c"/>
    <text x="44" y="25" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#e0e0e0" letter-spacing="0.5">Built with Bun</text>
  </g>

  <!-- Open Source badge -->
  <g transform="translate(580, 555)">
    <rect x="0" y="0" width="140" height="38" rx="19" fill="#1e1e2e" stroke="#6C63FF" stroke-width="1.5" opacity="0.9"/>
    <!-- GitHub-style icon -->
    <path d="M19,10 C13.5,10 9,14.5 9,20 C9,24.3 11.7,27.9 15.4,29.3 C15.9,29.4 16.1,29.1 16.1,28.8 L16.1,26.6 C13.3,27.2 12.7,25.2 12.7,25.2 C12.2,24 11.6,23.7 11.6,23.7 C10.7,23.1 11.7,23.1 11.7,23.1 C12.7,23.2 13.3,24.2 13.3,24.2 C14.2,25.7 15.8,25.3 16.2,25 C16.2,24.4 16.4,24 16.6,23.8 C14.4,23.6 12.1,22.7 12.1,19.2 C12.1,18.1 12.5,17.2 13.1,16.5 C13,16.3 12.7,15.3 13.2,14 C13.2,14 14.1,13.7 16.1,14.9 C16.9,14.7 17.8,14.6 18.6,14.6 C19.4,14.6 20.3,14.7 21.1,14.9 C23.1,13.7 24,14 24,14 C24.5,15.3 24.2,16.3 24.1,16.5 C24.7,17.2 25.1,18.1 25.1,19.2 C25.1,22.7 22.8,23.6 20.5,23.8 C20.8,24.1 21.1,24.6 21.1,25.4 L21.1,28.8 C21.1,29.1 21.3,29.4 21.8,29.3 C25.5,27.9 28.2,24.3 28.2,20 C28.2,14.5 23.7,10 19,10 Z"
          fill="#e0e0e0" transform="translate(2, 1) scale(0.65)"/>
    <text x="24" y="25" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#e0e0e0" letter-spacing="0.5">Open Source</text>
  </g>

  <!-- ========== CORNER DECORATIONS ========== -->
  <!-- Top-right subtle geometric accent -->
  <line x1="1150" y1="30" x2="1170" y2="30" stroke="url(#accentGrad)" stroke-width="2" opacity="0.3"/>
  <line x1="1170" y1="30" x2="1170" y2="50" stroke="url(#accentGrad)" stroke-width="2" opacity="0.3"/>

  <!-- Bottom-left subtle geometric accent -->
  <line x1="30" y1="600" x2="50" y2="600" stroke="url(#accentGrad)" stroke-width="2" opacity="0.3"/>
  <line x1="30" y1="580" x2="30" y2="600" stroke="url(#accentGrad)" stroke-width="2" opacity="0.3"/>

</svg>
