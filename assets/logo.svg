<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e6b8"/>
      <stop offset="100%" stop-color="#00a88a"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#12132a"/>
    </linearGradient>
  </defs>

  <!-- ===== ICON (shield + server) ===== -->
  <g transform="translate(10, 10) scale(0.36)">
    <!-- Shield outer -->
    <path d="M256 40 L440 120 L440 280 C440 380 360 450 256 480 C152 450 72 380 72 280 L72 120 Z"
          fill="url(#shieldGrad)" stroke="none"/>
    <!-- Shield inner dark -->
    <path d="M256 64 L418 134 L418 276 C418 368 346 430 256 458 C166 430 94 368 94 276 L94 134 Z"
          fill="url(#serverGrad)" stroke="none"/>

    <!-- Server rack top -->
    <rect x="166" y="156" width="180" height="64" rx="8" ry="8" fill="#2a2b4e" stroke="#00d4aa" stroke-width="2.5"/>
    <line x1="186" y1="176" x2="280" y2="176" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="186" y1="192" x2="310" y2="192" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <circle cx="326" cy="176" r="6" fill="#00d4aa"/>
    <circle cx="326" cy="196" r="5" fill="#00d4aa" opacity="0.5"/>

    <!-- Server rack middle -->
    <rect x="166" y="232" width="180" height="64" rx="8" ry="8" fill="#2a2b4e" stroke="#00d4aa" stroke-width="2.5"/>
    <line x1="186" y1="252" x2="270" y2="252" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="186" y1="268" x2="300" y2="268" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <circle cx="326" cy="252" r="6" fill="#00d4aa"/>
    <circle cx="326" cy="272" r="5" fill="#00d4aa" opacity="0.5"/>

    <!-- Server rack bottom -->
    <rect x="166" y="308" width="180" height="64" rx="8" ry="8" fill="#2a2b4e" stroke="#00d4aa" stroke-width="2.5"/>
    <line x1="186" y1="328" x2="290" y2="328" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="186" y1="344" x2="260" y2="344" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <circle cx="326" cy="328" r="6" fill="#00d4aa"/>
    <circle cx="326" cy="348" r="5" fill="#00d4aa" opacity="0.5"/>

    <!-- Checkmark -->
    <circle cx="256" cy="424" r="20" fill="#00d4aa"/>
    <polyline points="242,424 252,434 272,412" fill="none" stroke="#1a1b2e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== TEXT ===== -->
  <!-- "VPS" in bold accent color -->
  <text x="218" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" fill="#00d4aa" letter-spacing="4">VPS</text>

  <!-- "SNAPSHOT" in white -->
  <text x="218" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" fill="#ffffff" letter-spacing="8">SNAPSHOT</text>

  <!-- Thin teal underline accent -->
  <rect x="218" y="160" width="170" height="2" rx="1" fill="#00d4aa" opacity="0.6"/>
</svg>
